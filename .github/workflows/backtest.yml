name: Dual Momentum — Backtest

# -----------------------------------------------------------------------
# Monthly dual momentum backtest — mirrors the exact live bot logic.
# Rebalances on the last trading day of each month:
#   1. Absolute momentum check (Nifty 50 12M-1M vs threshold)
#   2. Relative momentum ranking (12M-1M return, skip last month)
#   3. Sell holdings outside hold_buffer; buy top portfolio_size
#
# NAV is marked-to-market every day for accurate Sharpe/drawdown.
# Results upload as 3 CSV artifacts (named with universe suffix).
#
# Universe:
#   NIFTY200 — default. top 15 of 200 Nifty stocks.
#   BEES     — top 5 BEES ETFs. Portfolio size/hold buffer auto-set.
# -----------------------------------------------------------------------

on:
  workflow_dispatch:
    inputs:
      universe:
        description: "Universe: NIFTY200 or BEES (default NIFTY200)"
        required: false
        default: "NIFTY200"
      start_date:
        description: "Start date (YYYY-MM-DD)"
        required: false
        default: "2018-01-01"
      end_date:
        description: "End date (YYYY-MM-DD)"
        required: false
        default: "2024-12-31"
      portfolio_size:
        description: "Max open positions (leave blank to use universe default: 15 for NIFTY200, 5 for BEES)"
        required: false
        default: ""
      capital:
        description: "Initial capital INR (default 1500000)"
        required: false
        default: "1500000"
      lookback:
        description: "Momentum lookback trading days (default 252 = ~12 months)"
        required: false
        default: "252"
      skip:
        description: "Skip-month days to avoid reversal (default 21 = ~1 month)"
        required: false
        default: "21"
      abs_threshold:
        description: "Absolute momentum threshold e.g. -0.05 = -5% (default -0.05)"
        required: false
        default: "-0.05"
      hold_buffer:
        description: "Sell if rank drops below this number (leave blank to use universe default: 20 for NIFTY200, 7 for BEES)"
        required: false
        default: ""
      hard_stop:
        description: "Hard stop fraction e.g. 0.15 = 15% (default 0.15)"
        required: false
        default: "0.15"
      no_abs_filter:
        description: "Disable absolute momentum? true = pure relative (default false)"
        required: false
        default: "false"
      no_weekly_stop:
        description: "Disable weekly Friday stop simulation? true = monthly-only (default false)"
        required: false
        default: "false"
      weighting:
        description: "Position sizing: 'graded' (rank-weighted) or 'equal' (flat). Leave empty for config default."
        required: false
        default: ""
      tranche:
        description: "Tranche label for output file naming (e.g. T1, T2). Produces separate result CSVs per tranche."
        required: false
        default: ""

jobs:
  backtest:
    name: Run Monthly Backtest (${{ github.event.inputs.universe || 'NIFTY200' }})
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run backtest
        env:
          STOCKSDEVELOPER_API_KEY: "backtest-mode"
          STOCKSDEVELOPER_ACCOUNT: "backtest-mode"
        run: |
          python backtest.py \
            --universe       "${{ github.event.inputs.universe      || 'NIFTY200' }}" \
            --start          "${{ github.event.inputs.start_date    || '2018-01-01' }}" \
            --end            "${{ github.event.inputs.end_date      || '2024-12-31' }}" \
            --capital        "${{ github.event.inputs.capital        || '1500000' }}" \
            --lookback       "${{ github.event.inputs.lookback       || '252' }}" \
            --skip           "${{ github.event.inputs.skip           || '21' }}" \
            --abs-threshold  "${{ github.event.inputs.abs_threshold  || '-0.05' }}" \
            --hard-stop      "${{ github.event.inputs.hard_stop      || '0.15' }}" \
            ${{ github.event.inputs.portfolio_size != '' && format('--portfolio-size {0}', github.event.inputs.portfolio_size) || '' }} \
            ${{ github.event.inputs.hold_buffer    != '' && format('--hold-buffer {0}',    github.event.inputs.hold_buffer)    || '' }} \
            ${{ github.event.inputs.no_abs_filter  == 'true' && '--no-abs-filter'  || '' }} \
            ${{ github.event.inputs.no_weekly_stop == 'true' && '--no-weekly-stop' || '' }} \
            ${{ github.event.inputs.weighting != '' && format('--weighting {0}', github.event.inputs.weighting) || '' }} \
            ${{ github.event.inputs.tranche   != '' && format('--tranche {0}',   github.event.inputs.tranche)   || '' }}

      - name: Upload backtest results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-${{ github.event.inputs.universe || 'NIFTY200' }}-${{ github.event.inputs.start_date || '2018' }}-${{ github.event.inputs.end_date || '2024' }}-run${{ github.run_id }}
          path: |
            backtest_results_*.csv
            backtest_trades_*.csv
            backtest_performance_*.csv
          if-no-files-found: warn
