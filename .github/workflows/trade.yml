name: Dual Momentum — Monthly Rebalance

# -----------------------------------------------------------------------
# Run MANUALLY on the LAST TRADING DAY of each month, ~3 PM IST.
# GitHub Actions UI: Actions → "Dual Momentum — Monthly Rebalance" → Run workflow
#
# What it does:
#   1. Downloads 3 years of price history for the selected universe
#   2. Checks absolute momentum: Is Nifty 50's 12M-1M return > abs_threshold?
#      → NO:  Sells ALL positions (move to cash until next month)
#      → YES: Ranks stocks/ETFs by 12M-1M return (Dual Momentum)
#   3. Sells holdings that have dropped below hold_buffer rank
#   4. Also sells any position down >hard_stop% from entry (hard stop)
#   5. Buys top-ranked stocks/ETFs not already held (fills open slots)
#   6. Fires CNC delivery market orders via stocksdeveloper → Zerodha
#   7. Commits updated positions + trade log CSVs to the repo
#
# Universe:
#   NIFTY200 — top 15 of Nifty 200 stocks  (positions_nifty200.csv)
#   BEES     — top 5 of BEES ETFs          (positions_bees.csv)
#
# Multi-account:
#   Add accounts to accounts.json (no secrets stored there — only env var names).
#   Add the corresponding secrets to GitHub Actions (repo Settings → Secrets).
#   Select the account name when triggering this workflow.
# -----------------------------------------------------------------------

on:
  workflow_dispatch:
    inputs:
      universe:
        description: "Universe to trade: NIFTY200 (stocks) or BEES (ETFs)"
        required: false
        default: "NIFTY200"
      account:
        description: "Account name (as defined in accounts.json, e.g. 'default', 'abhi2')"
        required: false
        default: "default"
      tranche:
        description: "Tranche label (e.g. T1, T2, JAN2025). Leave empty for default single-tranche portfolio."
        required: false
        default: ""
      capital:
        description: "Total capital for this tranche in Rs (e.g. 1500000 for ₹15L). Leave empty to use universe default."
        required: false
        default: ""
      weighting:
        description: "Position sizing: 'graded' (rank-weighted) or 'equal' (flat). Leave empty to use universe default (GRADED)."
        required: false
        default: ""
      hard_stop:
        description: "Hard stop fraction from entry, e.g. 0.15 = 15%. Leave empty to use universe default (0.15)."
        required: false
        default: ""
      abs_threshold:
        description: "Absolute momentum threshold, e.g. -0.05 = -5%. Leave empty for universe default (-0.05)."
        required: false
        default: ""
      no_abs_filter:
        description: "Disable absolute momentum filter? true = pure relative momentum. (default false)"
        required: false
        default: "false"
      dry_run:
        description: "Dry run? true = preview only, no orders sent (default false)"
        required: false
        default: "false"

jobs:
  monthly-rebalance:
    name: >
      Monthly Rebalance
      (${{ github.event.inputs.universe || 'NIFTY200' }}
      ${{ github.event.inputs.account != 'default' && github.event.inputs.account != '' && format('@{0}', github.event.inputs.account) || '' }}
      ${{ github.event.inputs.tranche != '' && format('[{0}]', github.event.inputs.tranche) || '' }})
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monthly rebalance
        env:
          # Default account secrets
          STOCKSDEVELOPER_API_KEY:          ${{ secrets.STOCKSDEVELOPER_API_KEY }}
          STOCKSDEVELOPER_ACCOUNT:          ${{ secrets.STOCKSDEVELOPER_ACCOUNT }}
          # Additional account secrets (unused unless matching account is selected)
          # Add more pairs here if you add accounts to accounts.json:
          #   STOCKSDEVELOPER_API_KEY_ABHI2: ${{ secrets.STOCKSDEVELOPER_API_KEY_ABHI2 }}
          #   STOCKSDEVELOPER_ACCOUNT_ABHI2: ${{ secrets.STOCKSDEVELOPER_ACCOUNT_ABHI2 }}
        run: |
          python main.py \
            --universe "${{ github.event.inputs.universe      || 'NIFTY200' }}" \
            --account  "${{ github.event.inputs.account       || 'default'  }}" \
            ${{ github.event.inputs.tranche      != '' && format('--tranche {0}',       github.event.inputs.tranche)      || '' }} \
            ${{ github.event.inputs.capital      != '' && format('--capital {0}',       github.event.inputs.capital)      || '' }} \
            ${{ github.event.inputs.weighting    != '' && format('--weighting {0}',     github.event.inputs.weighting)    || '' }} \
            ${{ github.event.inputs.hard_stop    != '' && format('--hard-stop {0}',     github.event.inputs.hard_stop)    || '' }} \
            ${{ github.event.inputs.abs_threshold != '' && format('--abs-threshold {0}', github.event.inputs.abs_threshold) || '' }} \
            ${{ github.event.inputs.no_abs_filter == 'true' && '--no-abs-filter' || '' }} \
            ${{ github.event.inputs.dry_run      == 'true' && '--dry-run'        || '' }}

      - name: Commit updated portfolio state
        if: always() && github.event.inputs.dry_run != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add positions_*.csv trade_log_*.csv 2>/dev/null || true
          ACCOUNT_LABEL="${{ github.event.inputs.account != 'default' && github.event.inputs.account != '' && format(' @{0}', github.event.inputs.account) || '' }}"
          TRANCHE_LABEL="${{ github.event.inputs.tranche != '' && format(' [{0}]', github.event.inputs.tranche) || '' }}"
          git diff --staged --quiet \
            && echo "No portfolio changes to commit." \
            || ( git commit -m "Monthly rebalance $(date -u '+%Y-%m-%d') — ${{ github.event.inputs.universe || 'NIFTY200' }}${ACCOUNT_LABEL}${TRANCHE_LABEL}" \
                 && git push )
